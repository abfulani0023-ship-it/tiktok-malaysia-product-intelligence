name: Daily Amazon to TikTok MY Product Report

on:
  schedule:
    # 09:13 Asia/Shanghai / Malaysia time = 01:13 UTC.
    # Avoid the top of the hour because GitHub scheduled workflows can be delayed or dropped during peak load.
    - cron: "13 1 * * *"
    # Backup run at 09:33. The sent marker below prevents duplicate emails on days when 09:13 succeeds.
    - cron: "33 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-product-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Skip if today's report was already sent
        id: sent-check
        run: |
          SENT_MARKER="outputs/sent-$(TZ=Asia/Shanghai date +%F).txt"
          echo "sent_marker=$SENT_MARKER" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "schedule" ] && [ -f "$SENT_MARKER" ]; then
            echo "already_sent=true" >> "$GITHUB_OUTPUT"
            echo "Daily report was already sent today: $SENT_MARKER"
          else
            echo "already_sent=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Gmail secrets
        if: steps.sent-check.outputs.already_sent != 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: |
          test -n "$GMAIL_USER" || (echo "Missing secret: GMAIL_USER" && exit 1)
          test -n "$GMAIL_APP_PASSWORD" || (echo "Missing secret: GMAIL_APP_PASSWORD" && exit 1)
          test -n "$REPORT_RECIPIENT" || (echo "Missing secret: REPORT_RECIPIENT" && exit 1)

      - name: Generate daily report
        if: steps.sent-check.outputs.already_sent != 'true'
        run: python3 src/run_pipeline.py

      - name: Send Gmail report
        if: steps.sent-check.outputs.already_sent != 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: python3 src/send_daily_email.py

      - name: Send Feishu group report
        if: steps.sent-check.outputs.already_sent != 'true'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python3 src/send_feishu_message.py

      - name: Mark today's report as sent
        if: steps.sent-check.outputs.already_sent != 'true'
        run: |
          mkdir -p outputs
          echo "sent_at_utc=$(date -u +%FT%TZ)" > "${{ steps.sent-check.outputs.sent_marker }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.sent-check.outputs.sent_marker }}"
          git commit -m "Mark daily report sent $(TZ=Asia/Shanghai date +%F)" || exit 0
          git push
