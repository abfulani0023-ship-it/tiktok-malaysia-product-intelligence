name: Daily Amazon to TikTok MY Product Report

on:
  schedule:
    # 09:00 Asia/Shanghai / Malaysia time = 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily report
        run: python3 src/run_pipeline.py

      - name: Send Gmail report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: python3 src/send_daily_email.py
